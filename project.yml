# XcodeGen project specification for ZIP Tracker.
#
# Generate the Xcode project with:   xcodegen generate
# (A pre-generated ZIPTracker.xcodeproj is also committed so you can open the
#  project without installing XcodeGen.)
#
# No third-party packages, no Swift Package dependencies — everything is local.
name: ZIPTracker
options:
  bundleIdPrefix: com.localfirst
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  ZIPTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ZIPTracker
        excludes:
          - "Resources/Info.plist"
      # Bundle the ZCTA data as a folder reference so subdirectory lookups work.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localfirst.ziptracker
        INFOPLIST_FILE: ZIPTracker/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        # Link the system SQLite library (no third-party packages).
        OTHER_LDFLAGS: "-lsqlite3"
    info:
      path: ZIPTracker/Resources/Info.plist

  ZIPTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
      # The sample DB must also be in the test bundle for ZCTAIndexTests.
      - path: ZIPTracker/Resources/ZCTA/zcta_sample.sqlite
        buildPhase: resources
    dependencies:
      - target: ZIPTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localfirst.ziptrackerTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ZIPTracker:
    build:
      targets:
        ZIPTracker: all
        ZIPTrackerTests: [test]
    test:
      targets:
        - ZIPTrackerTests
      gatherCoverageData: true
