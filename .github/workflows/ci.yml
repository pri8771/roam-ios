name: CI

# Builds and unit-tests Roam on an iOS Simulator. Requires macOS runners
# (Xcode is macOS-only). The app has no third-party Swift dependencies; the only
# tooling needed is Xcode + Python 3 (for the project/asset generators).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version
          python3 --version

      - name: Validate sample ZCTA bundle
        run: python3 Scripts/validate_zcta_bundle.py --input Roam/Resources/ZCTA/zcta_sample.sqlite

      # Regenerate generated artifacts so CI verifies the generators too. These
      # are committed, so a diff here would indicate a stale checked-in project.
      - name: Regenerate app assets
        run: python3 Scripts/generate_app_assets.py

      - name: Regenerate Xcode project
        run: python3 Scripts/generate_xcodeproj.py

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Roam.xcodeproj \
            -scheme Roam \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Create a fresh simulator
        id: sim
        run: |
          set -o pipefail
          # The pre-existing runner simulators sometimes have wedged CoreSimulator
          # state that fails app install 100% of the time. A brand-new device
          # avoids that. Pick the newest available iOS runtime + plain iPhone.
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "import json,sys;r=[x for x in json.load(sys.stdin)['runtimes'] if x.get('isAvailable') and x['platform']=='iOS'];r.sort(key=lambda d:tuple(int(p) for p in d['version'].split('.')));print(r[-1]['identifier'])")
          DTYPE=$(xcrun simctl list devicetypes -j | python3 -c "import json,sys,re;d=[x for x in json.load(sys.stdin)['devicetypes'] if re.match(r'.*SimDeviceType\.iPhone-\d+$',x['identifier'])];d.sort(key=lambda x:int(x['identifier'].rsplit('-',1)[1]));print(d[-1]['identifier'] if d else 'com.apple.CoreSimulator.SimDeviceType.iPhone-15')")
          echo "Runtime: $RUNTIME"
          echo "Device type: $DTYPE"
          UDID=$(xcrun simctl create "CI-iPhone" "$DTYPE" "$RUNTIME")
          echo "Created simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Test (manual install + retry)
        run: |
          set -o pipefail
          UDID="${{ steps.sim.outputs.udid }}"
          APP="DerivedData/Build/Products/Debug-iphonesimulator/Roam.app"
          ls -la "$APP" >/dev/null || { echo "Built app not found at $APP"; exit 1; }

          # CoreSimulator on GitHub runners intermittently fails app install with
          # "Unable to Install ... Please try again later." Manually install first
          # (per-attempt), and on failure recycle the CoreSimulator service and
          # erase the device before retrying.
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            echo "::group::Test attempt $attempt/$max"
            rm -rf TestResults.xcresult
            xcrun simctl boot "$UDID" 2>/dev/null || true
            xcrun simctl bootstatus "$UDID" -b || true
            if xcrun simctl install "$UDID" "$APP" && \
               xcodebuild test-without-building \
                 -project Roam.xcodeproj \
                 -scheme Roam \
                 -destination "platform=iOS Simulator,id=$UDID" \
                 -derivedDataPath DerivedData \
                 -resultBundlePath TestResults.xcresult \
                 CODE_SIGNING_ALLOWED=NO; then
              echo "::endgroup::"
              echo "Tests passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; recycling CoreSimulator service"
            xcrun simctl shutdown all || true
            sudo pkill -9 -f CoreSimulator 2>/dev/null || true
            sleep 12
            xcrun simctl erase "$UDID" || true
            attempt=$((attempt + 1))
          done
          echo "All $max test attempts failed"
          exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
